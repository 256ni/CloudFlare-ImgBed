name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build functions
        run: npx wrangler pages functions build --outdir=dist-worker

      - name: Collect static assets
        run: |
          mkdir -p dist-assets
          cp index.html dist-assets/ 2>/dev/null || true
          cp index.html.gz dist-assets/ 2>/dev/null || true
          cp -r css dist-assets/ 2>/dev/null || true
          cp -r js dist-assets/ 2>/dev/null || true
          cp -r img dist-assets/ 2>/dev/null || true
          cp -r fonts dist-assets/ 2>/dev/null || true
          cp -r static dist-assets/ 2>/dev/null || true
          echo "Static assets collected:"
          ls dist-assets/

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy dist-worker/index.js --name cloudflare-imgbed --compatibility-date 2024-07-24 --assets dist-assets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_VARS_TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          WRANGLER_VARS_TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          WRANGLER_VARS_BASIC_USER: ${{ secrets.BASIC_USER }}
          WRANGLER_VARS_BASIC_PASS: ${{ secrets.BASIC_PASS }}
