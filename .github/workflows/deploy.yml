name: Build Worker

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build functions
        run: npx wrangler pages functions build --outdir=dist-worker

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-script
          path: dist-worker/
